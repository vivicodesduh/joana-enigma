<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSÃO: DIA 7 - ARQUIVO 03</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #f0f0f0;
            font-family: 'Space Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 750px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .symbol {
            font-size: 4rem;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 1.5s ease;
            filter: grayscale(100%);
        }

        .symbol.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .typewriter {
            font-size: 1.3rem;
            letter-spacing: 1px;
            line-height: 2;
            text-align: left;
            margin-bottom: 40px;
            min-height: 200px;
        }

        .line {
            display: block;
            margin-bottom: 15px;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid transparent;
            width: 0;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #fff; }
        }

        .input-section {
            opacity: 0;
            transition: opacity 1s ease;
            margin-top: 20px;
        }

        .input-section.visible {
            opacity: 1;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid #555;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            text-align: center;
            padding: 10px;
            width: 80%;
            letter-spacing: 3px;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-bottom: 2px solid #fff;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 20px;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        .error-msg {
            color: #ff3333;
            font-size: 0.9rem;
            margin-top: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #success-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #success-screen.visible {
            opacity: 1;
        }

        .glitch-text {
            color: #00ffcc;
            font-weight: bold;
            font-size: 2rem;
            text-shadow: 2px 0 #fff, -2px 0 #000;
            animation: glitch 1s infinite;
            margin-bottom: 30px;
        }

        .final-message {
            font-size: 1.2rem;
            line-height: 2;
            letter-spacing: 1.5px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease 1s;
        }

        .final-message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 #fff, -2px 0 #000; }
            25% { text-shadow: -2px 0 #fff, 2px 0 #000; }
            50% { text-shadow: 2px 0 #00ffcc, -2px 0 #000; }
            75% { text-shadow: -2px 0 #fff, 2px 0 #00ffcc; }
            100% { text-shadow: 2px 0 #fff, -2px 0 #000; }
        }

    </style>
</head>
<body>

    <audio id="typing-audio" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="success-audio" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

    <div class="container" id="main-content">
        <div class="symbol" id="symbol">🪞</div>

        <div class="typewriter" id="text-container">
            </div>

        <div class="input-section hidden" id="input-section">
            <input type="text" id="answer-input" placeholder="IDENTIFIQUE A MENTORA" autocomplete="off">
            <br>
            <button class="btn" onclick="checkAnswer()">Confirmar</button>
            <div class="error-msg" id="error-msg">MERGULHO SUPERFICIAL. TENTE NOVAMENTE.</div>
        </div>
    </div>

    <div class="container hidden" id="success-screen">
        <p class="glitch-text">A TRÍADE ESTÁ COMPLETA</p>
        <p class="final-message" id="final-message">
            O organizador, o mensageiro e a arquiteta.<br><br>
            A chave do autodescobrimento agora é sua.<br><br>
            O canto do jovem ressoa a partir daqui.
        </p>
    </div>

    <script>
        // O ENIGMA
        const lines = [
            "Sua voz viajou por muitos nomes e séculos.",
            "Seu mapa é exclusivo para o mundo de dentro.",
            "Transforma a angústia moderna em autoconhecimento.",
            "A arquiteta do nosso despertar."
        ];
        
        const textContainer = document.getElementById('text-container');
        const symbol = document.getElementById('symbol');
        const inputSection = document.getElementById('input-section');
        const typingAudio = document.getElementById('typing-audio');

        window.onload = () => {
            setTimeout(() => {
                symbol.classList.add('visible');
                startTyping();
            }, 1000);
        };

        function startTyping() {
            let delay = 0;
            
            lines.forEach((lineText, index) => {
                const lineElement = document.createElement('span');
                lineElement.classList.add('line');
                lineElement.innerText = lineText;
                
                const typingDuration = lineText.length * 0.1;
                lineElement.style.animation = `typing ${typingDuration}s steps(${lineText.length}, end) forwards, blink-caret .75s step-end infinite`;
                lineElement.style.animationDelay = `${delay}s`;
                
                textContainer.appendChild(lineElement);
                
                setTimeout(() => {
                    typingAudio.currentTime = 0;
                    typingAudio.play();
                }, delay * 1000);

                setTimeout(() => {
                    lineElement.style.borderRightColor = 'transparent';
                    lineElement.style.animation = `typing ${typingDuration}s steps(${lineText.length}, end) forwards`;
                }, (delay + typingDuration) * 1000);

                delay += typingDuration + 0.5;
            });

            setTimeout(() => {
                inputSection.classList.remove('hidden');
                setTimeout(() => inputSection.classList.add('visible'), 50);
            }, delay * 1000 + 500);
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input').value.trim().toLowerCase();
            const errorMsg = document.getElementById('error-msg');
            const successAudio = document.getElementById('success-audio');

            const validAnswers = ['joanna de angelis', 'joana de angelis', 'joanna', 'joana'];
            const normalizedInput = input.normalize('NFD').replace(/[\u0300-\u036f]/g, "");

            if (validAnswers.includes(normalizedInput)) {
                // Resposta Correta
                errorMsg.style.opacity = '0';
                successAudio.volume = 0.5;
                successAudio.play();
                
                const mainContent = document.getElementById('main-content');
                mainContent.style.display = 'none';
                
                const successScreen = document.getElementById('success-screen');
                successScreen.classList.remove('hidden');
                setTimeout(() => {
                    successScreen.classList.add('visible');
                    document.getElementById('final-message').classList.add('visible');
                }, 100);
                
            } else {
                // Resposta Errada
                errorMsg.style.opacity = '1';
                setTimeout(() => {
                    errorMsg.style.opacity = '0';
                }, 3000);
            }
        }

        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
