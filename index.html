<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSÃO: DIA 7 - ARQUIVO 03</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #f0f0f0;
            font-family: 'Space Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita barra de rolagem geral */
        }

        .container {
            width: 85%;
            max-width: 700px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-height: 100vh; /* Mantém dentro da tela */
            overflow-y: auto; /* Permite rolar apenas dentro do container se a tela for minúscula */
            padding: 20px 0;
        }

        /* Oculta barra de rolagem do container para manter estética limpa */
        .container::-webkit-scrollbar { display: none; }
        .container { -ms-overflow-style: none; scrollbar-width: none; }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .symbol {
            font-size: clamp(3rem, 15vw, 4rem); /* Responsivo */
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 1.5s ease;
            filter: grayscale(100%);
        }

        .symbol.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .typewriter {
            font-size: clamp(0.9rem, 4vw, 1.3rem); /* Ajusta a fonte pro celular */
            letter-spacing: 1px;
            line-height: 1.6;
            text-align: left;
            margin-bottom: 30px;
            width: 100%;
            min-height: 180px; /* Evita que o campo de input pule muito de uma vez */
        }

        .line-container {
            margin-bottom: 15px;
            display: block;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: #fff;
            animation: blink 0.75s step-end infinite;
            vertical-align: bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .input-section {
            opacity: 0;
            transition: opacity 1s ease;
            width: 100%;
        }

        .input-section.visible {
            opacity: 1;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid #555;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: clamp(1rem, 5vw, 1.5rem); /* Ajusta tamanho do input */
            text-align: center;
            padding: 10px;
            width: 100%;
            max-width: 350px;
            letter-spacing: 2px;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-bottom: 2px solid #fff;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 20px;
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.8rem, 3vw, 1rem);
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        .error-msg {
            color: #ff3333;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            margin-top: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #success-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            height: 100vh;
        }

        #success-screen.visible {
            opacity: 1;
        }

        .glitch-text {
            color: #00ffcc;
            font-weight: bold;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            text-shadow: 2px 0 #fff, -2px 0 #000;
            animation: glitch 1s infinite;
            margin-bottom: 20px;
            text-align: center;
        }

        .final-message {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            line-height: 1.8;
            letter-spacing: 1.5px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease 1s;
            text-align: center;
        }

        .final-message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 #fff, -2px 0 #000; }
            25% { text-shadow: -2px 0 #fff, 2px 0 #000; }
            50% { text-shadow: 2px 0 #00ffcc, -2px 0 #000; }
            75% { text-shadow: -2px 0 #fff, 2px 0 #00ffcc; }
            100% { text-shadow: 2px 0 #fff, -2px 0 #000; }
        }

    </style>
</head>
<body>

    <audio id="typing-audio" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="success-audio" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

    <div class="container" id="main-content">
        <div class="symbol" id="symbol">🪞</div>

        <div class="typewriter" id="text-container">
            </div>

        <div class="input-section hidden" id="input-section">
            <input type="text" id="answer-input" placeholder="IDENTIFIQUE A MENTORA" autocomplete="off">
            <br>
            <button class="btn" onclick="checkAnswer()">Confirmar</button>
            <div class="error-msg" id="error-msg">MERGULHO SUPERFICIAL. TENTE NOVAMENTE.</div>
        </div>
    </div>

    <div class="container hidden" id="success-screen">
        <p class="glitch-text">A TRÍADE ESTÁ COMPLETA</p>
        <p class="final-message" id="final-message">
            O organizador, o mensageiro e a arquiteta.<br><br>
            A chave do autodescobrimento agora é sua.<br><br>
            O canto do jovem ressoa a partir daqui.
        </p>
    </div>

    <script>
        const lines = [
            "Sua voz viajou por muitos nomes e séculos.",
            "Seu mapa é exclusivo para o mundo de dentro.",
            "Transforma a angústia moderna em autoconhecimento.",
            "A arquiteta do nosso despertar."
        ];
        
        const textContainer = document.getElementById('text-container');
        const symbol = document.getElementById('symbol');
        const inputSection = document.getElementById('input-section');
        const typingAudio = document.getElementById('typing-audio');

        window.onload = () => {
            setTimeout(() => {
                symbol.classList.add('visible');
                startTypingSequence();
            }, 1000);
        };

        // Nova lógica de digitação baseada em JS (perfeita para mobile)
        async function startTypingSequence() {
            for (let i = 0; i < lines.length; i++) {
                const lineContainer = document.createElement('div');
                lineContainer.classList.add('line-container');
                
                const textSpan = document.createElement('span');
                const cursorSpan = document.createElement('span');
                cursorSpan.classList.add('cursor');
                
                lineContainer.appendChild(textSpan);
                lineContainer.appendChild(cursorSpan);
                textContainer.appendChild(lineContainer);

                await typeLine(lines[i], textSpan);
                
                // Remove o cursor da linha atual antes de ir para a próxima
                if (i < lines.length - 1) {
                    cursorSpan.style.display = 'none';
                }
            }

            // Exibe o input após terminar a digitação
            setTimeout(() => {
                inputSection.classList.remove('hidden');
                setTimeout(() => inputSection.classList.add('visible'), 50);
            }, 500);
        }

        function typeLine(sentence, element) {
            return new Promise(resolve => {
                let i = 0;
                typingAudio.currentTime = 0;
                typingAudio.play();
                
                const interval = setInterval(() => {
                    element.innerHTML += sentence.charAt(i);
                    i++;
                    if (i >= sentence.length) {
                        clearInterval(interval);
                        setTimeout(resolve, 600); // Pausa entre as frases
                    }
                }, 40); // Velocidade da digitação
            });
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input').value.trim().toLowerCase();
            const errorMsg = document.getElementById('error-msg');
            const successAudio = document.getElementById('success-audio');

            const validAnswers = ['joanna de angelis', 'joana de angelis', 'joanna', 'joana'];
            // Remove os acentos para facilitar a verificação
            const normalizedInput = input.normalize('NFD').replace(/[\u0300-\u036f]/g, "");

            if (validAnswers.includes(normalizedInput)) {
                errorMsg.style.opacity = '0';
                successAudio.volume = 0.5;
                successAudio.play();
                
                document.getElementById('main-content').style.display = 'none';
                
                const successScreen = document.getElementById('success-screen');
                successScreen.classList.remove('hidden');
                setTimeout(() => {
                    successScreen.classList.add('visible');
                    document.getElementById('final-message').classList.add('visible');
                }, 100);
            } else {
                errorMsg.style.opacity = '1';
                setTimeout(() => {
                    errorMsg.style.opacity = '0';
                }, 3000);
            }
        }

        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
